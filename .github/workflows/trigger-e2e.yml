# This file is auto-generated by scripts/generate-e2e-artifacts.mjs
# Do not edit manually. Run `npm run e2e:generate` to regenerate.
name: trigger-e2e
on:
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub App Token
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.E2E_APP_ID }}
          private-key: ${{ secrets.E2E_APP_PRIVATE_KEY }}

      - name: Setup git
        run: |
          git config user.email "e2e-bot@example.com"
          git config user.name "E2E Bot"
          REMOTE="https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/${{ github.repository }}.git"
          git remote set-url origin "$REMOTE"

      - name: "Trigger: push to main"
        run: |
          git commit --allow-empty -m "e2e: push-main (${{ github.run_id }})"
          git push origin HEAD:main

      - name: "Trigger: push to feature branch"
        run: |
          BRANCH="e2e/test-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          git commit --allow-empty -m "e2e: push-feature (${{ github.run_id }})"
          git push -u origin "$BRANCH"
          git checkout main

      - name: "Trigger: push tag v*"
        run: |
          TAG="v0.0.0-e2e-${{ github.run_id }}"
          git tag "$TAG"
          git push origin "$TAG"

      - name: "Trigger: push tag *-rc*"
        run: |
          TAG="0.0.0-rc-e2e-${{ github.run_id }}"
          git tag "$TAG"
          git push origin "$TAG"

      - name: "Trigger: push with src/ changes"
        run: |
          BRANCH="e2e/paths-src-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          echo "// e2e test ${{ github.run_id }}" > src/.e2e-test-file
          git add src/.e2e-test-file
          git commit -m "e2e: paths-src (${{ github.run_id }})"
          git push -u origin "$BRANCH"
          git checkout main

      - name: "Trigger: push with docs/ only changes"
        run: |
          BRANCH="e2e/paths-docs-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          mkdir -p docs
          echo "# e2e test ${{ github.run_id }}" > docs/.e2e-test-file.md
          git add docs/.e2e-test-file.md
          git commit -m "e2e: paths-docs (${{ github.run_id }})"
          git push -u origin "$BRANCH"
          git checkout main

      - name: "Trigger: create PR (opened)"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BRANCH="e2e/pr-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          git commit --allow-empty -m "e2e: pr-opened (${{ github.run_id }})"
          git push -u origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "E2E test: ${{ github.run_id }}" \
            --body "Auto-generated E2E test PR"

      - name: "Trigger: push to PR (synchronize)"
        run: |
          BRANCH="e2e/pr-${{ github.run_id }}"
          git checkout "$BRANCH"
          git commit --allow-empty -m "e2e: pr-sync (${{ github.run_id }})"
          git push origin "$BRANCH"
          git checkout main

      - name: Cleanup
        if: always()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh pr close "e2e/pr-${{ github.run_id }}" --delete-branch || true
          git push origin --delete "e2e/test-${{ github.run_id }}" || true
          git push origin --delete "e2e/paths-src-${{ github.run_id }}" || true
          git push origin --delete "e2e/paths-docs-${{ github.run_id }}" || true
          git push origin --delete "v0.0.0-e2e-${{ github.run_id }}" || true
          git push origin --delete "0.0.0-rc-e2e-${{ github.run_id }}" || true

