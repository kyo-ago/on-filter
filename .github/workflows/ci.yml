name: CI
on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  test:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: npm run e2e:check
      - name: Check dist is up to date
        run: |
          if [ "$(git diff --name-only dist/)" != "" ]; then
            echo "dist/ is out of date. Run 'npm run build' and commit the changes."
            exit 1
          fi

