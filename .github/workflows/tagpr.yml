name: tagpr
on:
  push:
    branches: ['main']

jobs:
  tagpr:
    if: github.event.head_commit.author.email != 'e2e-bot@example.com'
    runs-on: ubuntu-slim
    permissions:
      contents: write
      pull-requests: write
    outputs:
      tag: ${{ steps.tagpr.outputs.tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: Songmu/tagpr@b3fb89424646b06c8aa460f50307c60b6a541425 # v1.17.1
        id: tagpr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-semver:
    needs: tagpr
    if: needs.tagpr.outputs.tag != ''
    runs-on: ubuntu-slim
    permissions:
      contents: write
    steps:
      - uses: haya14busa/action-update-semver@7d2c558640ea49e798d46539536190aff8c18715 # v1.5.1
        with:
          tag: ${{ needs.tagpr.outputs.tag }}
