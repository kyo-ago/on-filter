name: e2e-driver

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  pull_request_target:
    branches: ['**']
  create:
  delete:
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  pull-requests: read

jobs:
  verify-on-filter-vs-oracle:
    runs-on: ubuntu-slim
    strategy:
      fail-fast: false
      matrix:
        case:
          - name: push-main
            oracle_workflow_file: oracle-push-main.yml
            filter_yaml: |
              push:
                branches:
                  - main
    steps:
      - uses: actions/checkout@v4

      - name: Evaluate on-filter
        id: onfilter
        uses: ./
        with:
          on: ${{ matrix.case.filter_yaml }}

      - name: Poll oracle workflow run
        id: oracle
        uses: actions/github-script@v7
        env:
          ORACLE_WORKFLOW_FILE: ${{ matrix.case.oracle_workflow_file }}
          POLL_INTERVAL_MS: '5000'
          TIMEOUT_MS: '60000'
        with:
          script: |
            const workflowId = process.env.ORACLE_WORKFLOW_FILE;
            const pollIntervalMs = Number(process.env.POLL_INTERVAL_MS);
            const timeoutMs = Number(process.env.TIMEOUT_MS);
            const deadline = Date.now() + timeoutMs;

            let fired = false;
            let detectedRun = null;

            while (Date.now() < deadline) {
              let runs = [];
              try {
                const res = await github.rest.actions.listWorkflowRuns({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  workflow_id: workflowId,
                  head_sha: context.sha,
                  event: context.eventName,
                  per_page: 10,
                });
                runs = res.data.workflow_runs || [];
              } catch (err) {
                if (err.status === 404) {
                  // Oracle workflow doesn't exist in the default branch yet; treat as not fired.
                  core.info(`Oracle workflow "${workflowId}" not found (404); treating as not fired.`);
                  break;
                }
                throw err;
              }

              const match = runs.find((run) => run.head_sha === context.sha && run.event === context.eventName);
              if (match) {
                fired = true;
                detectedRun = match;
                break;
              }

              await new Promise((resolve) => setTimeout(resolve, pollIntervalMs));
            }

            core.setOutput('fired', fired ? 'true' : 'false');
            core.setOutput('run_url', detectedRun?.html_url || '');

      - name: Compare on-filter with oracle
        id: compare
        uses: actions/github-script@v7
        env:
          FILTER_RESULT: ${{ steps.onfilter.outputs.result }}
          ORACLE_FIRED: ${{ steps.oracle.outputs.fired }}
          EVENT_ACTION: ${{ github.event.action || '' }}
          FILTER_YAML: ${{ matrix.case.filter_yaml }}
          CASE_NAME: ${{ matrix.case.name }}
          ORACLE_RUN_URL: ${{ steps.oracle.outputs.run_url }}
        with:
          script: |
            const expected = process.env.FILTER_RESULT === 'true';
            const actual = process.env.ORACLE_FIRED === 'true';

            const changedFiles = [];
            if (context.eventName === 'push') {
              const commits = context.payload.commits || [];
              for (const commit of commits) {
                changedFiles.push(...(commit.added || []), ...(commit.modified || []), ...(commit.removed || []));
              }
            } else if (context.eventName === 'pull_request' || context.eventName === 'pull_request_target') {
              const prNumber = context.payload.pull_request?.number;
              if (prNumber) {
                const files = await github.paginate(github.rest.pulls.listFiles, {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  per_page: 100,
                });
                for (const file of files) {
                  changedFiles.push(file.filename);
                }
              }
            }

            if (expected !== actual) {
              await core.summary
                .addHeading(`on-filter mismatch: ${process.env.CASE_NAME}`)
                .addTable([
                  [{data: 'key', header: true}, {data: 'value', header: true}],
                  ['eventName', context.eventName],
                  ['ref', context.ref],
                  ['action', process.env.EVENT_ACTION || '(none)'],
                  ['filter YAML', process.env.FILTER_YAML],
                  ['expected (on-filter result)', expected ? 'fired' : 'not fired'],
                  ['actual (oracle)', actual ? 'fired' : 'not fired'],
                  ['oracle run url', process.env.ORACLE_RUN_URL || '(not found)'],
                  ['changed files', changedFiles.length ? changedFiles.join('\n') : '(none or unavailable)'],
                ])
                .write();

              core.setFailed(`Mismatch in ${process.env.CASE_NAME}: expected=${expected}, actual=${actual}`);
              return;
            }

            core.info(`Matched in ${process.env.CASE_NAME}: expected=${expected}, actual=${actual}`);
